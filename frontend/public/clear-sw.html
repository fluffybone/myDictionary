<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Очистка WordEater</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #2b2d42;
        background: #f2edeb;
      }

      main {
        max-width: 420px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Очищаем приложение</h1>
      <p id="status">Удаляю старые данные WordEater...</p>
    </main>
    <script>
      const statusNode = document.querySelector("#status");

      async function clearAppData() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        statusNode.textContent = "Готово. Сейчас открою сайт заново.";
        window.setTimeout(() => {
          window.location.replace("/");
        }, 800);
      }

      clearAppData().catch(() => {
        statusNode.textContent = "Не получилось очистить автоматически. Удалите данные сайта в настройках браузера.";
      });
    </script>
  </body>
</html>
